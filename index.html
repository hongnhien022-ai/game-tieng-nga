<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная игра: Голубой домик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marck+Script&family=PT+Sans:wght@400;700&display=swap');
        
        body { font-family: 'PT Sans', sans-serif; background-color: #e0f2fe; }
        .russian-title { font-family: 'Marck Script', cursive; }
        
        .hotspot {
            position: absolute;
            width: 28px;
            height: 28px;
            background: rgba(30, 58, 138, 0.8);
            border: 2px solid #fbbf24;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .gradient-box { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-[2rem] overflow-hidden border-4 border-white">
        <header class="gradient-box p-10 text-white text-center">
            <h1 class="russian-title text-5xl md:text-6xl mb-2">Голубой домик</h1>
            <p class="text-xl text-blue-100 font-light tracking-widest uppercase">Борис Кустодиев • Тема: Мой день</p>
        </header>

        <nav class="flex flex-wrap bg-blue-900 text-blue-200">
            <button onclick="switchTab('task1')" id="btn-task1" class="tab-btn flex-1 py-5 font-bold border-b-4 border-yellow-400 text-yellow-400 transition">ЗАДАНИЕ 1</button>
            <button onclick="switchTab('task2')" id="btn-task2" class="tab-btn flex-1 py-5 font-bold border-b-4 border-transparent hover:text-white transition">ЗАДАНИЕ 2</button>
            <button onclick="switchTab('task3')" id="btn-task3" class="tab-btn flex-1 py-5 font-bold border-b-4 border-transparent hover:text-white transition">ЗАДАНИЕ 3</button>
            <button onclick="switchTab('task4')" id="btn-task4" class="tab-btn flex-1 py-5 font-bold border-b-4 border-transparent hover:text-white transition">ЗАДАНИЕ 4</button>
        </nav>

        <main class="p-6 md:p-12">
            
            <div id="task1" class="tab-content active">
                <div class="grid lg:grid-cols-2 gap-12 items-center">
                    <div class="relative rounded-3xl shadow-2xl overflow-hidden border-8 border-blue-50">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Kustodiev_Blue_house.jpg" class="w-full h-auto">
                        <div class="hotspot" style="top: 25%; left: 45%;" onclick="showWord('Дом', 'Это мой красивый голубой дом.')"></div>
                        <div class="hotspot" style="top: 45%; left: 45%;" onclick="showWord('Балкон', 'Мы любим сидеть на балконе.')"></div>
                        <div class="hotspot" style="top: 50%; left: 52%;" onclick="showWord('Пить чай', 'Утром я пью чай с семьёй.')"></div>
                        <div class="hotspot" style="top: 48%; left: 50%;" onclick="showWord('Самовар', 'На столе стоит старый самовар.')"></div>
                        <div class="hotspot" style="top: 85%; left: 80%;" onclick="showWord('Собака', 'Наша собака гуляет в саду.')"></div>
                    </div>
                    <div class="text-center p-10 bg-blue-50 rounded-[3rem]">
                        <h2 class="text-3xl font-bold text-blue-900 mb-6">Словарь в картинках</h2>
                        <div id="word-display" class="min-h-[150px] flex flex-col justify-center">
                            <p class="text-blue-400 italic">Нажмите на точки на картине!</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="task2" class="tab-content">
                <div class="max-w-3xl mx-auto space-y-6">
                    <h2 class="text-3xl font-bold text-center text-blue-900 mb-8 underline decoration-yellow-400">Ответьте на вопросы</h2>
                    <div id="quiz-box" class="space-y-4"></div>
                </div>
            </div>

            <div id="task3" class="tab-content">
                <div class="max-w-4xl mx-auto bg-gray-50 p-8 rounded-[2rem] border-2 border-blue-100 shadow-inner">
                    <h2 class="text-3xl font-bold text-center text-blue-900 mb-8 italic">О себе и своём дне</h2>
                    <div id="chat-box" class="space-y-4 mb-8 h-80 overflow-y-auto p-4 bg-white rounded-2xl border"></div>
                    <div id="chat-options" class="flex flex-wrap gap-3 justify-center"></div>
                </div>
            </div>

            <div id="task4" class="tab-content">
                <div class="grid lg:grid-cols-2 gap-8">
                    <div class="bg-yellow-50 p-8 rounded-[2rem] border-2 border-yellow-200">
                        <h2 class="text-2xl font-bold text-blue-900 mb-4 italic">Конструктор монолога</h2>
                        <div class="flex flex-col gap-2" id="phrase-list"></div>
                    </div>
                    <div class="bg-blue-900 text-white p-8 rounded-[2rem] shadow-2xl relative">
                        <h2 class="text-xl font-bold mb-6 text-yellow-400 uppercase tracking-widest">Мой рассказ:</h2>
                        <div id="final-monolog" class="text-lg leading-relaxed font-light min-h-[200px]">...</div>
                        <button onclick="resetMonolog()" class="mt-8 text-xs text-blue-300 hover:text-white underline">Очистить всё</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Quiz Data (Task 2)
        const quizData = [
            { q: "Что вы видите картине «Голубой домик»?", a: ["Современный город", "Старый русский дом", "Пляж"], c: 1 },
            { q: "Кто пьет чай на балконе второго этажа?", a: ["Дети", "Мужчина и женщина", "Кошка"], c: 1 },
            { q: "Сколько окон мы видим на фасаде дома?", a: ["Три", "Пять", "Четыре"], c: 0 },
            { q: "Какая атмосфера дня на этой картинке?", a: ["Шумная", "Спокойная и солнечная", "Грустная"], c: 1 }
        ];

        // Chat Data (Task 3)
        const chatSteps = [
            { q: "Какое время дня вы считаете самым приятным и спокойным?", o: ["Утро", "День", "Вечер"] },
            { q: "Что вы обычно делаете, чтобы расслабиться в конце дня?", o: ["Пью чай", "Читаю книгу", "Слушаю музыку"] },
            { q: "Где в вашем доме вам нравится проводить свободное время?", o: ["На балконе", "В саду", "У окна"] }
        ];

        // Monolog Phrases (Task 4)
        const phrases = [
            "Сегодня прекрасное солнечное утро.",
            "Я сижу на балконе нашего голубого домика и пью горячий чай.",
            "На столе стоит красивый старый самовар.",
            "Чай очень вкусный и ароматный.",
            "С балкона я вижу наш сад и тихую улицу.",
            "Внизу гуляют люди, а наша собака бегает во дворе.",
            "Погода сегодня очень спокойная и тёплая.",
            "Я очень люблю проводить время дома, это моё любимое время дня."
        ];

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-yellow-400', 'border-yellow-400');
                b.classList.add('text-blue-200', 'border-transparent');
            });
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.replace('text-blue-200', 'text-yellow-400');
            document.getElementById('btn-' + id).classList.replace('border-transparent', 'border-yellow-400');
            if(id==='task2') initQuiz();
            if(id==='task3') initChat();
            if(id==='task4') initMonolog();
        }

        function showWord(word, example) {
            document.getElementById('word-display').innerHTML = `
                <h3 class="text-5xl font-bold text-blue-900 mb-2">${word}</h3>
                <p class="text-lg text-blue-700 italic">${example}</p>
            `;
        }

        function initQuiz() {
            const box = document.getElementById('quiz-box');
            box.innerHTML = quizData.map((item, i) => `
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <p class="font-bold mb-4 text-blue-900">${i+1}. ${item.q}</p>
                    <div class="grid gap-2">
                        ${item.a.map((opt, oi) => `<button onclick="checkAnswer(${i}, ${oi})" id="q${i}a${oi}" class="text-left p-3 rounded-xl border hover:bg-blue-50 transition">${opt}</button>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function checkAnswer(qi, ai) {
            const btn = document.getElementById(`q${qi}a${ai}`);
            if(ai === quizData[qi].c) btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
            else btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
        }

        let chatIdx = 0;
        function initChat() {
            chatIdx = 0;
            document.getElementById('chat-box').innerHTML = "";
            addBotMessage(chatSteps[0].q);
            loadChatOptions();
        }

        function addBotMessage(text) {
            document.getElementById('chat-box').innerHTML += `<div class="flex justify-start"><p class="bg-blue-100 text-blue-900 p-3 rounded-2xl rounded-tl-none max-w-[80%] shadow-sm">${text}</p></div>`;
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function loadChatOptions() {
            const optBox = document.getElementById('chat-options');
            optBox.innerHTML = chatSteps[chatIdx].o.map(o => `<button onclick="nextChat('${o}')" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 shadow-md transition">${o}</button>`).join('');
        }

        function nextChat(ans) {
            document.getElementById('chat-box').innerHTML += `<div class="flex justify-end"><p class="bg-yellow-400 text-blue-900 p-3 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm">${ans}</p></div>`;
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
            chatIdx++;
            
            document.getElementById('chat-options').innerHTML = "";
            if(chatIdx < chatSteps.length) {
                setTimeout(() => { addBotMessage(chatSteps[chatIdx].q); loadChatOptions(); }, 600);
            } else {
                setTimeout(() => { 
                    addBotMessage("Спасибо за ваши ответы! Очень интересно."); 
                    document.getElementById('chat-options').innerHTML = "<button onclick='initChat()' class='text-blue-900 font-bold underline'>Начать заново</button>";
                }, 600);
            }
        }

        function initMonolog() {
            document.getElementById('phrase-list').innerHTML = phrases.map(p => `<button onclick="addToMonolog('${p}')" class="text-left p-3 bg-white border border-yellow-200 rounded-xl hover:bg-yellow-100 transition shadow-sm text-sm">${p}</button>`).join('');
        }

        let myStory = [];
        function addToMonolog(p) {
            if(!myStory.includes(p)) {
                myStory.push(p);
                document.getElementById('final-monolog').innerText = myStory.join(' ');
            }
        }

        function resetMonolog() { 
            myStory = []; 
            document.getElementById('final-monolog').innerText = "..."; 
        }

    </script>
</body>
</html>
